<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Smart Voting — Vote</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; }
      .card { border: 1px solid #ddd; padding: 20px; border-radius: 6px; }
      h1 { margin-top: 0 }
      .options { display:flex; gap:12px; }
      button { padding: 10px 18px; font-size:16px }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Smart Voting</h1>
      <p>Choose your favorite option and click Vote.</p>
      <form action="/vote" method="post">
        <div class="options">
          <label><input type="radio" name="choice" value="Cats" required> Cats</label>
          <label><input type="radio" name="choice" value="Dogs" required> Dogs</label>
        </div>
        <p><button type="submit">Vote</button></p>
      </form>
      <p>See live results at <a href="/">this app</a> or the <a href="http://localhost:8081">Results page</a>.</p>
    </div>
  </body>
</html>
